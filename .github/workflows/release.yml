name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: Push the image to GHCR
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  prepare-release-assets:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: /usr/bin/bash --noprofile --norc -e -o pipefail {0}
    env:
      BASH_ENV: /dev/null
    steps:
      - name: Checkout tag tree
        uses: actions/checkout@v4

      - name: Build release assets
        run: |
          mkdir assets
          cp scripts/install-agent.sh assets/install-agent.sh
          docker run --rm \
            --mount type=bind,src="$GITHUB_WORKSPACE",dst=/src,readonly \
            --mount type=bind,src="$GITHUB_WORKSPACE/assets",dst=/out \
            rust:1.96-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663 \
            sh -ceu 'cd /src && CARGO_TARGET_DIR=/tmp/target cargo build --locked --release --package agent && cp /tmp/target/release/agent /out/lg-agent-x86_64-unknown-linux-gnu'

      - name: Verify release assets against README pins
        run: |
          lg_installer_sha256=$(/usr/bin/grep -E '^LG_INSTALLER_SHA256=[0-9a-f]{64}$' README.md | /usr/bin/cut -d= -f2)
          lg_agent_sha256=$(/usr/bin/grep -E '^LG_AGENT_SHA256=[0-9a-f]{64}$' README.md | /usr/bin/cut -d= -f2)
          [ "$(/usr/bin/printf '%s\n' "$lg_installer_sha256" | /usr/bin/wc -l)" -eq 1 ]
          [ "$(/usr/bin/printf '%s\n' "$lg_agent_sha256" | /usr/bin/wc -l)" -eq 1 ]
          /usr/bin/printf '%s  %s\n' \
            "$lg_installer_sha256" assets/install-agent.sh \
            "$lg_agent_sha256" assets/lg-agent-x86_64-unknown-linux-gnu \
            | /usr/bin/sha256sum --check --strict

      - name: Upload verified release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            assets/install-agent.sh
            assets/lg-agent-x86_64-unknown-linux-gnu
          if-no-files-found: error
          compression-level: 0

  release-assets:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: [image, prepare-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: /usr/bin/bash --noprofile --norc -e -o pipefail {0}
    env:
      BASH_ENV: /dev/null
    steps:
      - name: Checkout tag tree
        uses: actions/checkout@v4

      - name: Download verified release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: assets

      - name: Verify and publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          lg_installer_sha256=$(/usr/bin/grep -E '^LG_INSTALLER_SHA256=[0-9a-f]{64}$' README.md | /usr/bin/cut -d= -f2)
          lg_agent_sha256=$(/usr/bin/grep -E '^LG_AGENT_SHA256=[0-9a-f]{64}$' README.md | /usr/bin/cut -d= -f2)
          [ "$(/usr/bin/printf '%s\n' "$lg_installer_sha256" | /usr/bin/wc -l)" -eq 1 ]
          [ "$(/usr/bin/printf '%s\n' "$lg_agent_sha256" | /usr/bin/wc -l)" -eq 1 ]
          /usr/bin/printf '%s  %s\n' \
            "$lg_installer_sha256" assets/install-agent.sh \
            "$lg_agent_sha256" assets/lg-agent-x86_64-unknown-linux-gnu \
            | /usr/bin/sha256sum --check --strict
          /usr/bin/gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes assets/install-agent.sh assets/lg-agent-x86_64-unknown-linux-gnu

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push == true }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
