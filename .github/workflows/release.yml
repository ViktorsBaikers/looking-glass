name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: Push the image to GHCR
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release-assets:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release assets
        run: |
          mkdir assets
          cp scripts/install-agent.sh assets/install-agent.sh
          docker run --rm \
            --mount type=bind,src="$GITHUB_WORKSPACE",dst=/src,readonly \
            --mount type=bind,src="$GITHUB_WORKSPACE/assets",dst=/out \
            rust:1.96-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663 \
            sh -ceu 'cd /src && CARGO_TARGET_DIR=/tmp/target cargo build --locked --release --package agent && cp /tmp/target/release/agent /out/lg-agent-x86_64-unknown-linux-gnu'

      - name: Verify release asset checksums
        run: |
          printf '%s  %s\n' \
            d824313a58f19e937f5365b9f5db019e05ba5163e00ec6249513b118142a7880 assets/install-agent.sh \
            9bb238a79847683432e9f20066b37ea1fbd027829ebb792d14fc983b6e9bb8c7 assets/lg-agent-x86_64-unknown-linux-gnu \
            | sha256sum --check --strict

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes assets/install-agent.sh assets/lg-agent-x86_64-unknown-linux-gnu

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push == true }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
